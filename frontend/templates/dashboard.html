{% extends "base.html" %}

{% block title %}Дашборд{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5>{{ user.username }}</h5>
                <p class="text-muted">Уровень {{ user.level }}</p>
                <div class="progress">
                    <div class="progress-bar" style="width: {{ user.xp % 100 }}%"></div>
                </div>
                <small>{{ user.xp }} XP</small>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Карта навыков</h5>
                <p class="text-muted">Скоро здесь появится дерево навыков.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
