{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="animate-in" style="max-width: 420px; margin: 40px auto;">
    <div class="card" style="padding: 32px;">
        <h2 style="text-align: center; margin-bottom: 24px;">🔑 Вход</h2>
        <form method="POST">
            <div style="margin-bottom: 16px;">
                <label class="form-label">Имя пользователя</label>
                <input type="text" name="username" class="form-control" placeholder="Введите имя" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
        </form>
        <p style="text-align: center; margin-top: 16px; color: var(--text-secondary);">
            Нет аккаунта? <a href="{{ url_for('main.register') }}" style="color: var(--accent);">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
